services:
  # ─── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: backforge-postgres
    environment:
      POSTGRES_USER: backforge
      POSTGRES_PASSWORD: backforge
      POSTGRES_DB: backforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: backforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Dev environment ────────────────────────────────────────────
  # Rust + Go запускаются здесь. Исходники монтируются напрямую,
  # артефакты сборки — в именованных volumes (не хламят PC).
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backforge-dev
    volumes:
      # Исходники (редактируешь на хосте, изменения сразу видны в контейнере)
      - .:/workspace
      # Кэш Cargo — не компилить всё с нуля при каждом рестарте
      - dev_cargo_registry:/cargo/registry
      - dev_cargo_git:/cargo/git
      # Артефакты сборки Rust
      - dev_target:/workspace/target
      # Кэш Go модулей
      - dev_gomod:/go/pkg/mod
      - dev_gocache:/root/.cache/go-build
      - dev_node_modules:/workspace/apps/builder/node_modules
      - dev_npm_cache:/root/.npm
      - dev_storage:/workspace/storage
    environment:
      DATABASE_URL: postgresql://backforge:backforge@postgres:5432/backforge
      REDIS_URL: redis://redis:6379
      API_GATEWAY_PORT: "8080"
      JWT_SECRET: dev-secret-change-in-production
      RUST_LOG: "info"
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
      BACKFORGE_STORAGE_ROOT: /workspace/storage
      BACKFORGE_DEPLOY_URL: http://localhost:8082
      DEPLOYMENT_SERVICE_PORT: "8082"
      BACKFORGE_SYNC_URL: http://localhost:8083
      SYNC_SERVICE_PORT: "8083"
      SYNC_STORE_PATH: /tmp/backforge-sync-store
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "5173:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  redis_data:
  dev_cargo_registry:
  dev_cargo_git:
  dev_target:
  dev_gomod:
  dev_gocache:
  dev_node_modules:
  dev_npm_cache:
  dev_storage:
